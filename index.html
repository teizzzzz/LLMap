<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言語景観マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #eef2f5;
    --panel: #ffffff;
    --panel-soft: #f8fafc;
    --ink: #17202a;
    --muted: #637083;
    --line: #d9e0e8;
    --line-strong: #aebbc9;
    --accent: #1f6feb;
    --accent-soft: #e8f1ff;
    --blue: #2563eb;
    --green: #15946f;
    --amber: #b76e00;
    --violet: #7c3aed;
    --teal: #0f8b8d;
    --shadow: 0 14px 34px rgba(15,23,42,0.12);
    --header-h: 58px;
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    letter-spacing: 0;
  }

  button,
  input,
  select {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    height: 100vh;
    display: grid;
    grid-template-rows: var(--header-h) 1fr;
  }

  .topbar {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(255,255,255,0.78), 0 10px 28px rgba(15,23,42,0.06);
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto minmax(190px, 1fr);
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    z-index: 20;
  }

  .brand {
    min-width: 0;
  }

  .brand-title {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.2;
    color: #111827;
  }

  .brand-subtitle {
    margin-top: 3px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .view-tabs {
    display: inline-grid;
    grid-auto-flow: column;
    gap: 4px;
    padding: 4px;
    background: #e8edf3;
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  .view-tab {
    border: 0;
    background: transparent;
    color: #465363;
    min-width: 76px;
    height: 34px;
    padding: 0 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }

  .view-tab.active {
    background: #ffffff;
    color: var(--accent);
    box-shadow: 0 1px 4px rgba(15,23,42,0.12);
  }

  .top-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .file-btn,
  .icon-btn,
  .select,
  .source-pill {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    border-radius: 6px;
    height: 34px;
  }

  .file-btn {
    padding: 0 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .file-btn:hover,
  .icon-btn:hover,
  .select:hover,
  .source-pill:hover {
    border-color: var(--line-strong);
    background: var(--panel-soft);
  }

  .file-btn:focus-visible,
  .icon-btn:focus-visible,
  .select:focus-visible,
  .chip:focus-visible,
  .view-tab:focus-visible,
  .photo-card:focus-visible {
    outline: 3px solid rgba(31,111,235,0.22);
    outline-offset: 2px;
  }

  .source-pill {
    display: inline-grid;
    place-items: center;
    min-width: 88px;
    padding: 0 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .icon-btn {
    width: 36px;
    display: grid;
    place-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
  }

  .count-pill {
    height: 34px;
    display: inline-grid;
    place-items: center;
    min-width: 74px;
    padding: 0 10px;
    border-radius: 6px;
    background: #111827;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  .workspace {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
  }

  .left-pane {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    border-right: 1px solid var(--line);
  }

  .toolbar {
    min-height: 54px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--panel-soft);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 7px;
    flex: 0 0 auto;
  }

  .toolbar-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .chip-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chip {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    height: 30px;
    padding: 0 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .select {
    min-width: 148px;
    padding: 0 30px 0 10px;
    font-size: 12px;
  }

  .view-stage {
    min-height: 0;
    position: relative;
    background: #e6ebf1;
  }

  .view {
    position: absolute;
    inset: 0;
    display: none;
    min-height: 0;
  }

  .view.active {
    display: block;
  }

  #map {
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .canvas-view {
    height: 100%;
    overflow: auto;
    padding: 18px;
  }

  .viz-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 14px;
    align-items: start;
  }

  .viz-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 1px 0 rgba(15,23,42,0.03);
    min-width: 0;
  }

  .viz-panel.full { grid-column: span 12; }
  .viz-panel.half { grid-column: span 6; }
  .viz-panel.third { grid-column: span 4; }
  .viz-panel.two-thirds { grid-column: span 8; }

  .panel-head {
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--line);
  }

  .panel-title {
    margin: 0;
    font-size: 13px;
    font-weight: 700;
  }

  .panel-note {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
  }

  .panel-body {
    padding: 14px;
  }

  .metric-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .metric {
    min-height: 76px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel-soft);
    position: relative;
    overflow: hidden;
  }

  .metric::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
  }

  .metric-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
  }

  .metric-label {
    margin-top: 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
  }

  .bar-list {
    display: grid;
    gap: 9px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: minmax(88px, 160px) 1fr 44px;
    align-items: center;
    gap: 10px;
    min-height: 24px;
  }

  .bar-label {
    font-size: 12px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    height: 10px;
    border-radius: 999px;
    background: #e6edf5;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    min-width: 2px;
    border-radius: 999px;
    background: var(--blue);
  }

  .bar-value {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .donut-wrap {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 18px;
    align-items: center;
  }

  .donut {
    width: 170px;
    height: 170px;
  }

  .legend {
    display: grid;
    gap: 8px;
  }

  .legend-row {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 8px;
    align-items: center;
    font-size: 12px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .timeline {
    min-height: 230px;
    display: grid;
    align-items: end;
    grid-auto-flow: column;
    grid-auto-columns: minmax(26px, 1fr);
    gap: 6px;
    padding-top: 8px;
  }

  .time-col {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }

  .time-bar {
    width: 100%;
    min-height: 3px;
    border-radius: 5px 5px 0 0;
    background: var(--teal);
  }

  .time-label {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    writing-mode: vertical-rl;
  }

  .network-wrap {
    height: 100%;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .network-summary {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
    background: var(--panel-soft);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }

  .network-badge {
    flex: 0 0 auto;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 700;
  }

  .network-stage {
    min-height: 0;
    position: relative;
    background:
      linear-gradient(rgba(20,48,80,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,48,80,0.07) 1px, transparent 1px),
      #f4f7fb;
    background-size: 34px 34px;
  }

  #network-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .net-link {
    stroke: rgba(70,82,96,0.25);
    stroke-width: 1;
  }

  .net-node {
    cursor: pointer;
    filter: drop-shadow(0 3px 7px rgba(15,23,42,0.16));
  }

  .net-label {
    pointer-events: none;
    fill: #17202a;
    font-size: 11px;
    font-weight: 700;
    paint-order: stroke;
    stroke: rgba(248,250,252,0.92);
    stroke-width: 3px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .photo-card {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius);
    overflow: hidden;
    min-width: 0;
    cursor: pointer;
  }

  .photo-card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 8px 18px rgba(15,23,42,0.10);
    transform: translateY(-1px);
  }

  .photo-thumb {
    aspect-ratio: 4 / 3;
    background: #e9eef5;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    overflow: hidden;
  }

  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-meta {
    padding: 10px;
  }

  .photo-id {
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .photo-title {
    margin-top: 4px;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    min-height: 18px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .photo-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .side-panel {
    min-width: 0;
    min-height: 0;
    background: var(--panel);
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .side-head {
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }

  .side-title {
    margin: 0;
    font-size: 13px;
    font-weight: 700;
  }

  .side-scroll {
    min-height: 0;
    overflow-y: auto;
  }

  .empty-state {
    min-height: 100%;
    display: grid;
    align-content: center;
    gap: 10px;
    padding: 28px;
    text-align: center;
    color: var(--muted);
  }

  .empty-mark {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    margin: 0 auto;
    display: grid;
    place-items: center;
    border: 1px solid var(--line);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    background: var(--panel-soft);
  }

  .empty-state p {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
  }

  .detail {
    display: none;
  }

  .detail.active {
    display: block;
  }

  .detail-photo {
    aspect-ratio: 4 / 3;
    background: #e9eef5;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  .detail-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .detail-body {
    padding: 16px;
  }

  .detail-id {
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }

  .detail-title {
    margin-top: 5px;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.35;
  }

  .detail-sub {
    margin-top: 7px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .section {
    margin-top: 18px;
  }

  .section-title {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel-soft);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
  }

  .tag.ja { background: #e8f1ff; border-color: #b8cff8; color: #174ea6; }
  .tag.zh { background: #fff4db; border-color: #e9c676; color: #82520c; }
  .tag.ko { background: #e6f6ef; border-color: #98d3bd; color: #116149; }
  .tag.en { background: #f0eaff; border-color: #c9b8f2; color: #5934a3; }
  .tag.other { background: #eef2f6; border-color: #cfd8e3; color: #465363; }
  .tag.source-top { background: #e8f1ff; border-color: #b8cff8; color: #174ea6; }
  .tag.source-bottom { background: #e6f6ef; border-color: #98d3bd; color: #116149; }

  .field-list {
    margin-top: 8px;
  }

  .field {
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
  }

  .field:last-child {
    border-bottom: 0;
  }

  .field-label {
    color: var(--muted);
  }

  .field-value {
    text-align: right;
    font-weight: 500;
    overflow-wrap: anywhere;
  }

  .memo {
    margin-top: 10px;
    padding: 10px 12px;
    border-left: 3px solid var(--accent);
    background: var(--panel-soft);
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.7;
  }

  .marker-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 2px 7px rgba(15,23,42,0.32);
  }

  .marker-dot.active {
    transform: scale(1.55);
    border-color: #111827;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 6px;
    box-shadow: var(--shadow);
    font-family: 'Noto Sans JP', sans-serif;
  }

  .mobile-detail-toggle {
    display: none;
  }

  @media (max-width: 980px) {
    .topbar {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      height: auto;
      min-height: var(--header-h);
      padding: 8px 10px;
    }

    .brand {
      grid-column: 1 / 2;
    }

    .top-actions {
      grid-column: 2 / 3;
    }

    .view-tabs {
      grid-column: 1 / -1;
      width: 100%;
      overflow-x: auto;
      grid-auto-columns: minmax(74px, 1fr);
    }

    .app {
      grid-template-rows: auto 1fr;
    }

    .workspace {
      grid-template-columns: 1fr;
      position: relative;
    }

    .left-pane {
      border-right: 0;
    }

    .toolbar {
      padding: 8px 10px;
      min-height: 48px;
    }

    .side-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(78vh, 520px);
      z-index: 50;
      transform: translateY(calc(100% - 48px));
      transition: transform 0.22s ease;
      border-top: 1px solid var(--line);
      box-shadow: 0 -12px 30px rgba(15,23,42,0.16);
    }

    .side-panel.open {
      transform: translateY(0);
    }

    .mobile-detail-toggle {
      display: inline-grid;
    }

    .side-head {
      min-height: 48px;
    }

    .canvas-view {
      padding: 10px;
      padding-bottom: 62px;
    }

    .viz-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .viz-panel,
    .viz-panel.full,
    .viz-panel.half,
    .viz-panel.third,
    .viz-panel.two-thirds {
      grid-column: auto;
    }

    .metric-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .donut-wrap {
      grid-template-columns: 1fr;
      justify-items: center;
    }

    .bar-row {
      grid-template-columns: minmax(74px, 112px) 1fr 38px;
    }
  }

  @media (max-width: 560px) {
    .brand-title {
      font-size: 14px;
    }

    .brand-subtitle {
      display: none;
    }

    .file-btn {
      width: 34px;
      padding: 0;
      overflow: hidden;
      color: transparent;
      position: relative;
    }

    .file-btn::after {
      content: "CSV";
      color: var(--ink);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 10px;
    }

    .count-pill {
      min-width: 58px;
      font-size: 11px;
    }

    .source-pill {
      display: none;
    }

    .view-tab {
      min-width: 68px;
      padding: 0 8px;
      font-size: 11px;
    }

    .select {
      min-width: 132px;
    }

    .metric-row {
      grid-template-columns: 1fr;
    }

    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
    }

    .field {
      grid-template-columns: 94px 1fr;
      gap: 8px;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1 class="brand-title">言語景観マップ</h1>
      <div class="brand-subtitle">Linguistic Landscape Field Records</div>
    </div>

    <nav class="view-tabs" aria-label="表示切替">
      <button class="view-tab active" data-view="map">Map</button>
      <button class="view-tab" data-view="network">Network</button>
      <button class="view-tab" data-view="stats">Stats</button>
      <button class="view-tab" data-view="gallery">Gallery</button>
    </nav>

    <div class="top-actions">

<script>
const FIELD = {
  id: ['SignID', 'ImageID', 'ID'],
  title: ['名称', 'Name'],
  lat: ['緯度', 'lat', 'latitude'],
  lng: ['経度', 'lng', 'longitude'],
  lang: ['主要言語'],
  subLang: ['補助言語'],
  decoLang: ['装飾的言語'],
  source: ['来源類型'],
  status: ['_status'],
  photo: ['写真ファイル名'],
  photoId: ['写真ID'],
  panorama: ['全景写真ファイル名'],
  date: ['採集日時'],
  location: ['位置描述'],
  actor: ['設置主体'],
  carrier: ['担体類型'],
  relation: ['多言語関係'],
  layer: ['層状性'],
  time: ['時間性'],
  readability: ['可読性'],
  visibility: ['視認等級'],
  audience: ['想定受容者'],
  quality: ['制作品質'],
  memo: ['備考'],
};

const DEFAULT_CSV_PATH = 'data_ai.csv';
const FALLBACK_CSV_PATH = 'data.csv';
const COLORS = ['#2563eb', '#b76e00', '#15946f', '#7c3aed', '#d94841', '#0f8b8d', '#637083', '#9a5d24'];
const LANG_COLORS = {
  '日本語': '#2563eb',
  '中文': '#b76e00',
  '韓国語': '#15946f',
  '英語': '#7c3aed',
  'その他': '#637083',
};

let map;
let tileLayer;
let markers = [];
let allRows = [];
let filteredRows = [];
let activeLanguage = 'all';
let activeSource = 'all';
let activeStatus = 'all';
let activeView = 'map';
let selectedRow = null;
let selectedMarker = null;

function first(row, keys, fallback = '') {
  for (const key of keys) {
    const value = row[key];
    if (value !== undefined && value !== null && String(value).trim() !== '') return String(value).trim();
  }
  return fallback;
}

function html(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function norm(value) {
  return String(value || '').trim();
}

function shortValue(value, fallback = '—') {
  const text = norm(value);
  if (!text || text === '—') return fallback;
  return text;
}

function getId(row) {
  return first(row, FIELD.id, '—');
}

function getLang(row) {
  return shortValue(first(row, FIELD.lang), '未分類');
}

function getColorForValue(value) {
  for (const [key, color] of Object.entries(LANG_COLORS)) {
    if (value && value.includes(key)) return color;
  }
  const index = Math.abs([...String(value || '')].reduce((sum, ch) => sum + ch.charCodeAt(0), 0)) % COLORS.length;
  return COLORS[index];
}

function getLangClass(value) {
  if (!value) return 'other';
  if (value.includes('日本語')) return 'ja';
  if (value.includes('中文')) return 'zh';
  if (value.includes('韓国語')) return 'ko';
  if (value.includes('英語')) return 'en';
  return 'other';
}

function sourceClass(value) {
  if (value && value.includes('top')) return 'source-top';
  if (value && value.includes('bottom')) return 'source-bottom';
  return '';
}

function countBy(rows, getter) {
  const counts = new Map();
  rows.forEach(row => {
    const key = shortValue(getter(row), '未分類');
    counts.set(key, (counts.get(key) || 0) + 1);
  });
  return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ja'));
}

function initMap() {
  map = L.map('map', {
    center: [35.5972, 139.3422],
    zoom: 16,
    zoomControl: true,
  });

  tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19,
  }).addTo(map);
}

function makeMarkerIcon(color, active = false) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-dot ${active ? 'active' : ''}" style="background:${color}"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

function clearMarkers() {
  markers.forEach(item => map.removeLayer(item.marker));
  markers = [];
  selectedMarker = null;
}

function renderMap() {
  if (!map) return;
  clearMarkers();
  const bounds = [];

  filteredRows.forEach(row => {
    const lat = parseFloat(first(row, FIELD.lat));
    const lng = parseFloat(first(row, FIELD.lng));
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

    const color = getColorForValue(getLang(row));
    const marker = L.marker([lat, lng], { icon: makeMarkerIcon(color) });
    marker.on('click', () => selectRow(row, { focusMap: true, marker }));
    marker.bindPopup(`<strong>${html(getId(row))}</strong><br>${html(first(row, FIELD.title, '名称不明'))}`);
    marker.addTo(map);
    markers.push({ marker, row, color });
    bounds.push([lat, lng]);
  });

  if (bounds.length > 1) map.fitBounds(bounds, { padding: [36, 36] });
  else if (bounds.length === 1) map.setView(bounds[0], 17);
}

function updateMarkerSelection(marker) {
  if (selectedMarker) {
    const previous = markers.find(item => item.marker === selectedMarker);
    if (previous) previous.marker.setIcon(makeMarkerIcon(previous.color, false));
  }
  selectedMarker = marker || null;
  if (selectedMarker) {
    const current = markers.find(item => item.marker === selectedMarker);
    if (current) selectedMarker.setIcon(makeMarkerIcon(current.color, true));
  }
}

function buildFilters() {
  const languages = countBy(allRows, row => getLang(row)).map(([name]) => name);
  const languageBox = document.getElementById('language-filters');
  languageBox.innerHTML = '<button class="chip active" data-filter="all">すべて</button>';
  languages.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.filter = lang;
    btn.textContent = lang;
    btn.style.borderColor = getColorForValue(lang);
    btn.addEventListener('click', () => {
      activeLanguage = lang;
      applyFilters();
    });
    languageBox.appendChild(btn);
  });
  languageBox.querySelector('[data-filter="all"]').addEventListener('click', () => {
    activeLanguage = 'all';
    applyFilters();
  });

  fillSelect('source-filter', countBy(allRows, row => first(row, FIELD.source)).map(([name]) => name), value => {
    activeSource = value;
    applyFilters();
  });
  fillSelect('status-filter', countBy(allRows, row => first(row, FIELD.status)).map(([name]) => name), value => {
    activeStatus = value;
    applyFilters();
  });
}

function fillSelect(id, values, onChange) {
  const select = document.getElementById(id);
  select.innerHTML = '<option value="all">すべて</option>';
  values.forEach(value => {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
  select.onchange = () => onChange(select.value);
}

function applyFilters() {
  document.querySelectorAll('#language-filters .chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === activeLanguage);
  });

  filteredRows = allRows.filter(row => {
    const langOk = activeLanguage === 'all' || getLang(row) === activeLanguage;
    const sourceOk = activeSource === 'all' || shortValue(first(row, FIELD.source), '未分類') === activeSource;
    const statusOk = activeStatus === 'all' || shortValue(first(row, FIELD.status), '未分類') === activeStatus;
    return langOk && sourceOk && statusOk;
  });

  document.getElementById('count-badge').textContent = filteredRows.length;
  renderCurrentView();
}

function renderCurrentView() {
  if (activeView === 'map') {
    renderMap();
    setTimeout(() => map.invalidateSize(), 50);
  }
  if (activeView === 'network') renderNetwork();
  if (activeView === 'stats') renderStats();
  if (activeView === 'gallery') renderGallery();
}

function switchView(view) {
  activeView = view;
  document.querySelectorAll('.view-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
  document.querySelectorAll('.view').forEach(panel => panel.classList.toggle('active', panel.id === `view-${view}`));
  renderCurrentView();
}

function selectRow(row, options = {}) {
  selectedRow = row;
  renderDetail(row);
  document.getElementById('side-panel').classList.add('open');

  if (options.marker) updateMarkerSelection(options.marker);
  else updateMarkerSelection(null);

  if (options.focusMap && map) {
    const lat = parseFloat(first(row, FIELD.lat));
    const lng = parseFloat(first(row, FIELD.lng));
    if (Number.isFinite(lat) && Number.isFinite(lng)) map.panTo([lat, lng]);
  }
}

function renderDetail(row) {
  const empty = document.getElementById('empty-state');
  const panel = document.getElementById('detail-panel');
  const title = first(row, FIELD.title, '名称不明');
  const photo = first(row, FIELD.photo);
  const source = first(row, FIELD.source);
  const langs = [first(row, FIELD.lang), first(row, FIELD.subLang), first(row, FIELD.decoLang)]
    .filter(v => v && v !== '—')
    .map(v => `<span class="tag ${getLangClass(v)}">${html(v)}</span>`)
    .join('');

  const fields = [
    ['写真ID', first(row, FIELD.photoId)],
    ['全景写真', first(row, FIELD.panorama)],
    ['設置主体', first(row, FIELD.actor)],
    ['担体類型', first(row, FIELD.carrier)],
    ['来源', source],
    ['多言語関係', first(row, FIELD.relation)],
    ['層状性', first(row, FIELD.layer)],
    ['時間性', first(row, FIELD.time)],
    ['可読性', first(row, FIELD.readability)],
    ['視認等級', first(row, FIELD.visibility)],
    ['想定受容者', first(row, FIELD.audience)],
    ['制作品質', first(row, FIELD.quality)],
    ['採集日時', first(row, FIELD.date)],
  ];

  panel.innerHTML = `
    <div class="detail-photo">
      ${photo ? `<img src="photos/${encodeURIComponent(photo)}" alt="${html(title)}" onerror="this.outerHTML='<span>${html(photo)}</span>'">` : '<span>No Photo</span>'}
    </div>
    <div class="detail-body">
      <div class="detail-id">${html(getId(row))}</div>
      <div class="detail-title">${html(title)}</div>
      <div class="detail-sub">${html(first(row, FIELD.location, '位置描述なし'))}</div>
      <div class="section">
        <div class="section-title">Language</div>
        <div class="tag-row">${langs || '<span class="tag">未分類</span>'}</div>
      </div>
      <div class="section">
        <div class="section-title">Attributes</div>
        <div class="field-list">
          ${fields.map(([label, value]) => `
            <div class="field">
              <div class="field-label">${html(label)}</div>
              <div class="field-value">${source && label === '来源' ? `<span class="tag ${sourceClass(source)}">${html(shortValue(value))}</span>` : html(shortValue(value))}</div>
            </div>
          `).join('')}
        </div>
      </div>
      ${first(row, FIELD.memo) ? `
        <div class="section">
          <div class="section-title">Memo</div>
          <div class="memo">${html(first(row, FIELD.memo))}</div>
        </div>` : ''}
    </div>
  `;
  document.getElementById('side-title').textContent = getId(row);
  empty.style.display = 'none';
  panel.classList.add('active');
}

function renderStats() {
  const rows = filteredRows;
  const geoCount = rows.filter(row => Number.isFinite(parseFloat(first(row, FIELD.lat))) && Number.isFinite(parseFloat(first(row, FIELD.lng)))).length;
  const photoCount = rows.filter(row => first(row, FIELD.photo)).length;
  const reviewed = rows.filter(row => first(row, FIELD.status).includes('reviewed')).length;
  const languageCount = countBy(rows, row => getLang(row)).length;

  document.getElementById('metrics').innerHTML = [
    ['Records', rows.length],
    ['With GPS', geoCount],
    ['Photos', photoCount],
    ['Languages', languageCount],
  ].map(([label, value]) => `
    <div class="metric">
      <div class="metric-value">${value}</div>
      <div class="metric-label">${label}</div>
    </div>
  `).join('');

  renderBars('lang-bars', countBy(rows, row => getLang(row)), value => getColorForValue(value), 8);
  renderBars('carrier-bars', countBy(rows, row => first(row, FIELD.carrier)), () => '#0f8b8d', 7);
  renderDonut(countBy(rows, row => first(row, FIELD.source)));
  renderTimeline(rows);
}

function renderBars(id, entries, colorFn, limit = 8) {
  const box = document.getElementById(id);
  const top = entries.slice(0, limit);
  const max = Math.max(1, ...top.map(([, value]) => value));
  box.innerHTML = top.length ? top.map(([label, value]) => `
    <div class="bar-row">
      <div class="bar-label" title="${html(label)}">${html(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, value / max * 100)}%;background:${colorFn(label)}"></div></div>
      <div class="bar-value">${value}</div>
    </div>
  `).join('') : '<div class="panel-note">No data</div>';
}

function renderDonut(entries) {
  const svg = document.getElementById('source-donut');
  const legend = document.getElementById('source-legend');
  const total = entries.reduce((sum, [, count]) => sum + count, 0);
  const radius = 46;
  const cx = 60;
  const cy = 60;
  let angle = -90;
  svg.innerHTML = '';

  if (!total) {
    svg.innerHTML = '<circle cx="60" cy="60" r="42" fill="none" stroke="#d9e0e8" stroke-width="18"></circle>';
    legend.innerHTML = '<div class="panel-note">No data</div>';
    return;
  }

  entries.forEach(([label, count], index) => {
    const span = count / total * 360;
    const end = angle + span;
    const large = span > 180 ? 1 : 0;
    const startPoint = polar(cx, cy, radius, angle);
    const endPoint = polar(cx, cy, radius, end);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${startPoint.x} ${startPoint.y} A ${radius} ${radius} 0 ${large} 1 ${endPoint.x} ${endPoint.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', COLORS[index % COLORS.length]);
    path.setAttribute('stroke-width', '18');
    path.setAttribute('stroke-linecap', 'butt');
    svg.appendChild(path);
    angle = end;
  });

  const center = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  center.setAttribute('x', '60');
  center.setAttribute('y', '64');
  center.setAttribute('text-anchor', 'middle');
  center.setAttribute('font-size', '18');
  center.setAttribute('font-family', 'DM Mono, monospace');
  center.setAttribute('fill', '#17202a');
  center.textContent = total;
  svg.appendChild(center);

  legend.innerHTML = entries.map(([label, count], index) => `
    <div class="legend-row">
      <span class="legend-dot" style="background:${COLORS[index % COLORS.length]}"></span>
      <span>${html(label)}</span>
      <span>${count}</span>
    </div>
  `).join('');
}

function polar(cx, cy, r, angle) {
  const rad = (angle - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function renderTimeline(rows) {
  const entries = countBy(rows, row => {
    const raw = first(row, FIELD.date);
    return raw ? raw.slice(0, 10) : '日付なし';
  }).sort((a, b) => a[0].localeCompare(b[0]));
  const max = Math.max(1, ...entries.map(([, value]) => value));
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = entries.length ? entries.map(([label, value]) => `
    <div class="time-col" title="${html(label)}: ${value}">
      <div class="time-bar" style="height:${Math.max(4, value / max * 168)}px"></div>
      <div class="time-label">${html(label)}</div>
    </div>
  `).join('') : '<div class="panel-note">No date data</div>';
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = filteredRows.map(row => {
    const photo = first(row, FIELD.photo);
    const title = first(row, FIELD.title, '名称不明');
    const lang = getLang(row);
    const source = first(row, FIELD.source);
    return `
      <article class="photo-card" data-id="${html(getId(row))}">
        <div class="photo-thumb">
          ${photo ? `<img src="photos/${encodeURIComponent(photo)}" alt="${html(title)}" loading="lazy" onerror="this.outerHTML='<span>${html(photo)}</span>'">` : '<span>No Photo</span>'}
        </div>
        <div class="photo-meta">
          <div class="photo-id">${html(getId(row))}</div>
          <div class="photo-title">${html(title)}</div>
          <div class="photo-tags">
            <span class="tag ${getLangClass(lang)}">${html(lang)}</span>
            ${source ? `<span class="tag ${sourceClass(source)}">${html(source)}</span>` : ''}
          </div>
        </div>
      </article>
    `;
  }).join('');

  grid.querySelectorAll('.photo-card').forEach(card => {
    card.addEventListener('click', () => {
      const row = filteredRows.find(item => getId(item) === card.dataset.id);
      if (row) selectRow(row);
    });
  });
}

function renderNetwork() {
  const svg = document.getElementById('network-svg');
  const stage = svg.parentElement;
  const width = Math.max(320, stage.clientWidth || 900);
  const height = Math.max(360, stage.clientHeight || 620);
  const rows = filteredRows.slice(0, 180);
  const nodes = [];
  const nodeMap = new Map();
  const links = [];

  function node(id, label, type, color, weight = 1) {
    if (nodeMap.has(id)) {
      nodeMap.get(id).weight += weight;
      return nodeMap.get(id);
    }
    const item = {
      id,
      label,
      type,
      color,
      weight,
      x: width / 2 + (Math.random() - 0.5) * width * 0.42,
      y: height / 2 + (Math.random() - 0.5) * height * 0.42,
      vx: 0,
      vy: 0,
    };
    nodeMap.set(id, item);
    nodes.push(item);
    return item;
  }

  rows.forEach(row => {
    const sign = node(`sign:${getId(row)}`, getId(row), 'sign', '#111827', 1);
    const lang = node(`lang:${getLang(row)}`, getLang(row), 'lang', getColorForValue(getLang(row)), 2);
    links.push([sign, lang]);

    const source = first(row, FIELD.source);
    if (source) links.push([sign, node(`source:${source}`, source, 'source', source.includes('bottom') ? '#15946f' : '#1f6feb', 1.5)]);

    const actor = first(row, FIELD.actor);
    if (actor) links.push([sign, node(`actor:${actor}`, actor, 'actor', '#0f8b8d', 1.2)]);

    const carrier = first(row, FIELD.carrier);
    if (carrier) links.push([sign, node(`carrier:${carrier}`, carrier, 'carrier', '#7c3aed', 1)]);
  });

  runLayout(nodes, links, width, height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.innerHTML = `
    <g>
      ${links.map(([a, b]) => `<line class="net-link" x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}"></line>`).join('')}
    </g>
    <g>
      ${nodes.map(n => {
        const r = Math.min(22, n.type === 'sign' ? 4 + Math.sqrt(n.weight) : 8 + Math.sqrt(n.weight) * 2.2);
        return `
          <g class="net-node" data-id="${html(n.id)}">
            <circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r.toFixed(1)}" fill="${n.color}" opacity="${n.type === 'sign' ? '0.82' : '0.95'}"></circle>
            ${n.type !== 'sign' || n.weight > 1 ? `<text class="net-label" x="${(n.x + r + 4).toFixed(1)}" y="${(n.y + 4).toFixed(1)}">${html(n.label)}</text>` : ''}
          </g>
        `;
      }).join('')}
    </g>
  `;

  svg.querySelectorAll('.net-node').forEach(group => {
    group.addEventListener('click', () => {
      const id = group.dataset.id || '';
      if (!id.startsWith('sign:')) return;
      const row = rows.find(item => `sign:${getId(item)}` === id);
      if (row) selectRow(row);
    });
  });

  document.getElementById('network-summary').innerHTML = [
    ['Records', rows.length],
    ['Nodes', nodes.length],
    ['Links', links.length],
    ['Shown', rows.length < filteredRows.length ? `${rows.length}/${filteredRows.length}` : rows.length],
  ].map(([label, value]) => `<div class="network-badge">${label}: ${value}</div>`).join('');
}

function runLayout(nodes, links, width, height) {
  if (!nodes.length) return;
  const centerX = width / 2;
  const centerY = height / 2;
  for (let step = 0; step < 120; step++) {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i];
        const b = nodes[j];
        const dx = a.x - b.x || 0.01;
        const dy = a.y - b.y || 0.01;
        const dist2 = dx * dx + dy * dy;
        const force = Math.min(900 / dist2, 0.9);
        a.vx += dx * force;
        a.vy += dy * force;
        b.vx -= dx * force;
        b.vy -= dy * force;
      }
    }

    links.forEach(([a, b]) => {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy) || 1;
      const desired = a.type === 'sign' ? 82 : 120;
      const force = (dist - desired) * 0.006;
      const fx = dx / dist * force;
      const fy = dy / dist * force;
      a.vx += fx;
      a.vy += fy;
      b.vx -= fx;
      b.vy -= fy;
    });

    nodes.forEach(n => {
      n.vx += (centerX - n.x) * 0.002;
      n.vy += (centerY - n.y) * 0.002;
      n.x += n.vx;
      n.y += n.vy;
      n.vx *= 0.78;
      n.vy *= 0.78;
      n.x = Math.max(32, Math.min(width - 120, n.x));
      n.y = Math.max(32, Math.min(height - 32, n.y));
    });
  }
}

function setDataSourceLabel(label) {
  const badge = document.getElementById('data-source-badge');
  if (badge) {
    badge.textContent = label;
    badge.title = `現在のデータソース: ${label}`;
  }
}

function loadCSV(csvText, sourceLabel = 'manual CSV') {
  const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  allRows = result.data.filter(row => Object.values(row).some(v => norm(v)));
  filteredRows = allRows.slice();
  activeLanguage = 'all';
  activeSource = 'all';
  activeStatus = 'all';
  selectedRow = null;
  document.getElementById('empty-state').style.display = '';
  document.getElementById('detail-panel').classList.remove('active');
  document.getElementById('detail-panel').innerHTML = '';
  buildFilters();
  applyFilters();
  setDataSourceLabel(sourceLabel);
}

function loadCSVFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadCSV(e.target.result, file.name);
  reader.readAsText(file, 'UTF-8');
  event.target.value = '';
}

function loadDefaultCSV() {
  fetch(DEFAULT_CSV_PATH)
    .then(response => {
      if (!response.ok) throw new Error(`${DEFAULT_CSV_PATH} not found`);
      return response.text();
    })
    .then(text => loadCSV(text, DEFAULT_CSV_PATH))
    .catch(() => {
      fetch(FALLBACK_CSV_PATH)
        .then(response => {
          if (!response.ok) throw new Error(`${FALLBACK_CSV_PATH} not found`);
          return response.text();
        })
        .then(text => loadCSV(text, FALLBACK_CSV_PATH))
        .catch(loadFallbackData);
    });
}
